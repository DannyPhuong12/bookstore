<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Book List</title>
</head>
<body>
    <h1>Book List</h1>

    <p><a th:href="@{/addbook}">Add Book</a></p>

    <form th:action="@{/logout}" method="post">
        <button type="submit">Logout</button>
    </form>

    <p>User: <span th:text="${#authentication.name}"></span></p>
    
    <table border="1">
        <thead>
            <tr>
                <th>Title</th>
                <th>Author</th>
                <th>Year</th>
                <th>ISBN</th>
                <th>Price</th>
                <th>Category</th>
                <th>Delete</th>
                <th>Edit</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="book : ${books}">
                <td th:text="${book.title}"></td>
                <td th:text="${book.author}"></td>
                <td th:text="${book.publicationYear}"></td>
                <td th:text="${book.isbn}"></td>
                <td th:text="${book.price}"></td>
                <td th:text="${book.category != null ? book.category.name : ''}"></td>

                <td sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{/delete/{id}(id=${book.id})}">Delete</a>
                </td>
                <td sec:authorize="!hasRole('ADMIN')">-</td>

                <td><a th:href="@{/edit/{id}(id=${book.id})}">Edit</a></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
