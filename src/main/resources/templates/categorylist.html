<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Category List</title>
</head>
<body>
    <h1>Categories</h1>

    <p><a th:href="@{/addcategory}">Add Category</a></p>

    <table border="1">
        <thead>
            <tr>
                <th>Category ID</th>
                <th>Name</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="category : ${categories}">
                <td th:text="${category.categoryid}"></td>
                <td th:text="${category.name}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
